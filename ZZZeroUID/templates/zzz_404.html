<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Session Expired — ZZZeroUID</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Outfit', sans-serif;
      background: #08090e;
      color: #c8c4bc;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .container {
      text-align: center;
      background: rgba(255,255,255,0.03);
      padding: 2.5rem;
      border: 1px solid rgba(255,51,102,0.2);
      border-radius: 2px;
      max-width: 400px;
      position: relative;
    }
    .container::before, .container::after {
      content: ''; position: absolute;
      width: 16px; height: 16px;
      border-color: #ff3366; border-style: solid; opacity: 0.4;
    }
    .container::before { top: 0; left: 0; border-width: 2px 0 0 2px; }
    .container::after { bottom: 0; right: 0; border-width: 0 2px 2px 0; }
    h1 {
      font-family: 'Orbitron', monospace;
      font-size: 2.5rem;
      color: #ff3366;
      margin: 0 0 0.5rem;
    }
    p { font-size: 0.9rem; color: rgba(200,196,188,0.6); margin: 0.5rem 0; }
    a {
      display: inline-block;
      margin-top: 1rem;
      padding: 0.5rem 1.5rem;
      border: 1px solid rgba(255,51,102,0.4);
      border-radius: 2px;
      color: #ff3366;
      text-decoration: none;
      font-family: 'Orbitron', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      transition: all 0.3s;
    }
    a:hover { background: rgba(255,51,102,0.1); box-shadow: 0 0 20px rgba(255,51,102,0.15); }
  </style>
</head>
<body>
  <div class="container">
    <h1>EXPIRED</h1>
    <p>This login link has expired.</p>
    <p>Send <strong>zzz登录</strong> in Discord to get a new one.</p>
    <a href="https://github.com/ZZZure/ZZZeroUID">ZZZeroUID GitHub</a>
  </div>
</body>
</html>
